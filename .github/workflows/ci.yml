name: CI

on:
  push:
    branches:
      - master
      - main
      - release/**
  pull_request:
    branches:
      - master
      - main

jobs:
  verify:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            dev_lock: requirements-dev-linux.txt
          - os: windows-latest
            dev_lock: requirements-dev-windows.txt
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install lock tooling
        run: |
          python -m pip install --upgrade pip pip-tools

      - name: Check committed locks
        run: python scripts/dev.py lock --check

      - name: Bootstrap environment
        run: python scripts/dev.py bootstrap

      - name: Run verify lane
        shell: bash
        run: |
          set -o pipefail
          python scripts/dev.py verify 2>&1 | tee verify.log

      - name: Upload verify logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: verify-logs-${{ matrix.os }}
          path: verify.log
          if-no-files-found: ignore

  smoke:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            dev_lock: requirements-dev-linux.txt
          - os: windows-latest
            dev_lock: requirements-dev-windows.txt
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install lock tooling
        run: |
          python -m pip install --upgrade pip pip-tools

      - name: Check committed locks
        run: python scripts/dev.py lock --check

      - name: Bootstrap environment
        run: python scripts/dev.py bootstrap

      - name: Run smoke lane
        shell: bash
        run: |
          set -o pipefail
          python scripts/dev.py smoke 2>&1 | tee smoke.log

      - name: Upload smoke logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-logs-${{ matrix.os }}
          path: smoke.log
          if-no-files-found: ignore
